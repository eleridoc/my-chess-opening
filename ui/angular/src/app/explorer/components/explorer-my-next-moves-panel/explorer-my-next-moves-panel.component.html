<div class="app-card-flat">
	<div class="app-card-flat-top explorer-my-next-moves-panel__header">
		<span>Movements played</span>

		<button
			type="button"
			mat-stroked-button
			class="mat-stroked-button-d-5 explorer-my-next-moves-panel__filter-button"
			(click)="openFilterDialog()"
			[matTooltip]="'Open my next moves filters'"
		>
			<mat-icon aria-hidden="true">filter_list</mat-icon>
			{{ filterButtonLabel() }}
		</button>
	</div>

	<div class="app-card-flat-content-fit explorer-my-next-moves-panel__content">
		<app-section-loader [loading]="isLoading()" label="Loading move statistics…" [mask]="true">
			<div class="explorer-my-next-moves-panel__body">
				<ng-container *ngIf="loadError() as error; else nextMovesContent">
					<div class="explorer-my-next-moves-panel__error">
						{{ error }}
					</div>
				</ng-container>

				<ng-template #nextMovesContent>
					<ng-container *ngIf="myNextMovesResult() as result; else emptyState">
						<div class="explorer-my-next-moves-panel__table">
							<app-explorer-my-next-moves-table
								[rows]="result.moves"
								[positionSummary]="result.positionSummary"
							></app-explorer-my-next-moves-table>
						</div>
					</ng-container>
				</ng-template>

				<ng-template #emptyState>
					<div class="explorer-my-next-moves-panel__placeholder">
						Move statistics will appear here for the current position.
					</div>
				</ng-template>
			</div>
		</app-section-loader>
	</div>
</div>
