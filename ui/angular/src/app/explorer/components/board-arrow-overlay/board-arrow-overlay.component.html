<svg
	*ngIf="arrows.length > 0"
	class="board-arrow-overlay"
	viewBox="0 0 100 100"
	preserveAspectRatio="none"
	aria-hidden="true"
>
	<defs>
		<ng-container *ngFor="let arrow of arrows; trackBy: trackByArrow">
			<marker
				[attr.id]="getMarkerId(arrow)"
				markerWidth="6"
				markerHeight="6"
				refX="5.2"
				refY="3"
				orient="auto"
				markerUnits="strokeWidth"
			>
				<path d="M0,0 L6,3 L0,6 z" fill="context-stroke"></path>
			</marker>
		</ng-container>
	</defs>

	<ng-container *ngFor="let arrow of arrows; trackBy: trackByArrow">
		<line
			[attr.x1]="getArrowLine(arrow).x1"
			[attr.y1]="getArrowLine(arrow).y1"
			[attr.x2]="getArrowLine(arrow).x2"
			[attr.y2]="getArrowLine(arrow).y2"
			[attr.stroke]="getArrowColor(arrow)"
			[attr.stroke-width]="getStrokeWidth(arrow)"
			[attr.marker-end]="'url(#' + getMarkerId(arrow) + ')'"
			stroke-linecap="round"
			fill="none"
		></line>
	</ng-container>
</svg>
