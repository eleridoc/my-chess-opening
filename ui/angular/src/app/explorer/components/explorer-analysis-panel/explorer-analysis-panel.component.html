<div class="app-card-flat explorer-analysis-panel">
	<div class="app-card-flat-top explorer-analysis-panel__header">
		<div class="explorer-analysis-panel__title">
			<mat-icon aria-hidden="true">analytics</mat-icon>
			<span>Analysis</span>
		</div>

		<div class="explorer-analysis-panel__actions">
			<button
				mat-stroked-button
				class="mat-stroked-button-d-5"
				type="button"
				(click)="openAnalysisInformation()"
				[disabled]="!hasCurrentDbGame()"
				matTooltip="Show current game and Stockfish information"
			>
				<mat-icon aria-hidden="true">info</mat-icon>
				<span>Information</span>
			</button>

			<button
				mat-stroked-button
				class="mat-stroked-button-d-5"
				type="button"
				(click)="refresh()"
				[disabled]="panelLoading()"
				matTooltip="Refresh Stockfish status and latest analysis"
			>
				<mat-icon aria-hidden="true">refresh</mat-icon>
				<span>Refresh</span>
			</button>
		</div>
	</div>

	<div class="app-card-flat-content-fit explorer-analysis-panel__content">
		<app-section-loader [loading]="panelLoading()" [label]="loaderLabel()" [mask]="true">
			<div class="explorer-analysis-panel__body">
				@if (!hasCurrentDbGame()) {
					<div class="explorer-analysis-panel__empty">
						<mat-icon aria-hidden="true">info</mat-icon>
						<div>
							<strong>No database game loaded.</strong>
							<p>
								Stockfish analysis is currently available for games loaded from the database. Open a
								game from the Games page to analyze it here.
							</p>
						</div>
					</div>
				} @else {
					<app-explorer-game-analysis-panel
						[analysis]="latestAnalysis()"
						[loadError]="loadError()"
						[canStartAnalysis]="canStartAnalysis()"
						[isAnalyzing]="isAnalyzing()"
						[isCancelling]="isCancelling()"
						(startAnalysis)="startAnalysis($event)"
						(cancelAnalysis)="cancelAnalysis()"
					/>
				}
			</div>
		</app-section-loader>
	</div>
</div>
