<h2 mat-dialog-title class="explorer-position-export-dialog__title">
	{{ title }}
</h2>

<mat-dialog-content class="explorer-position-export-dialog__content app-density--5">
	<div class="explorer-position-export-dialog__grid">
		<section class="explorer-position-export-dialog__section">
			<div class="explorer-position-export-dialog__section-header">
				<h3 class="explorer-position-export-dialog__section-title">FEN</h3>
				<p class="explorer-position-export-dialog__section-subtitle">
					Exact current board position.
				</p>
			</div>

			<mat-form-field
				appearance="fill"
				subscriptSizing="dynamic"
				class="explorer-position-export-dialog__field explorer-position-export-dialog__field--fen"
			>
				<textarea matInput rows="2" [value]="fenPreview" readonly></textarea>
			</mat-form-field>
		</section>

		<section class="explorer-position-export-dialog__section">
			<div class="explorer-position-export-dialog__section-header">
				<h3 class="explorer-position-export-dialog__section-title">PGN</h3>
				<p class="explorer-position-export-dialog__section-subtitle">
					Current line up to the active cursor.
				</p>
			</div>

			<mat-form-field
				appearance="fill"
				subscriptSizing="dynamic"
				class="explorer-position-export-dialog__field explorer-position-export-dialog__field--pgn"
			>
				<textarea matInput rows="6" [value]="pgnPreview" readonly></textarea>
			</mat-form-field>
		</section>

		<section class="explorer-position-export-dialog__section">
			<div class="explorer-position-export-dialog__section-header">
				<h3 class="explorer-position-export-dialog__section-title">PNG</h3>
				<p class="explorer-position-export-dialog__section-subtitle">
					Export the current live board rendering.
				</p>
			</div>

			<div class="explorer-position-export-dialog__png-box">
				<p class="explorer-position-export-dialog__hint">
					The PNG export uses the current rendered board and keeps the visible board state as close
					as possible to what is displayed in Explorer.
				</p>
			</div>
		</section>
	</div>
</mat-dialog-content>

<mat-dialog-actions align="end" class="explorer-position-export-dialog__footer">
	<div class="explorer-position-export-dialog__footer-actions">
		<button
			mat-flat-button
			class="mat-flat-button-d-5"
			color="primary"
			type="button"
			[disabled]="!canCopyFen"
			(click)="onCopyFen()"
		>
			Copy FEN
		</button>

		<button
			mat-flat-button
			class="mat-flat-button-d-5"
			color="primary"
			type="button"
			[disabled]="!canCopyPgn"
			(click)="onCopyPgn()"
		>
			Copy PGN
		</button>

		<button
			mat-flat-button
			class="mat-flat-button-d-5"
			color="primary"
			type="button"
			[disabled]="!canExportPng"
			(click)="onExportPng()"
		>
			Export PNG
		</button>

		<button mat-button class="mat-flat-button-d-5" type="button" (click)="onClose()">Close</button>
	</div>
</mat-dialog-actions>
