<section class="dashboard-heatmap" [class.dashboard-heatmap--large]="size === 'large'">
	<header class="dashboard-heatmap__header">
		<div>
			<h2 class="dashboard-heatmap__title">{{ title }}</h2>
			<p class="dashboard-heatmap__subtitle" *ngIf="subtitle">
				{{ subtitle }}
			</p>
		</div>
	</header>

	<div class="dashboard-heatmap__scroll">
		<div #container class="dashboard-heatmap__container" [id]="elementId"></div>
	</div>

	<p class="dashboard-heatmap__empty" *ngIf="points.length === 0">
		No daily data available for this period.
	</p>
</section>
