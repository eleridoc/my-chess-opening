<section class="dashboard-summary-card" [ngClass]="'dashboard-summary-card--' + variant">
	<header class="dashboard-summary-card__header">
		<div class="dashboard-summary-card__heading">
			<h2 class="dashboard-summary-card__title">{{ title }}</h2>
			<p class="dashboard-summary-card__subtitle" *ngIf="subtitle">
				{{ subtitle }}
			</p>
		</div>
	</header>

	<div class="dashboard-summary-card__total">
		<span class="dashboard-summary-card__total-value">{{ summary.totalGames }}</span>
		<span class="dashboard-summary-card__total-label">Games played</span>
	</div>

	<div class="dashboard-summary-card__results">
		<div class="dashboard-summary-card__result dashboard-summary-card__result--wins">
			<div class="dashboard-summary-card__result-main">
				<span class="dashboard-summary-card__result-label">
					<span
						class="dashboard-summary-card__metric-icon dashboard-summary-card__metric-icon--wins"
						matTooltip="Games won from the imported account owner's perspective."
						matTooltipPosition="above"
					>
						<span class="dashboard-summary-card__metric-symbol" aria-hidden="true">+</span>
					</span>
				</span>

				<span class="dashboard-summary-card__result-rate">
					{{ formatPercent(summary.winRatePercent) }}
				</span>
			</div>

			<div class="dashboard-summary-card__result-count">
				{{ summary.wins }}
				<span>Wins</span>
			</div>
		</div>

		<div class="dashboard-summary-card__result dashboard-summary-card__result--draws">
			<div class="dashboard-summary-card__result-main">
				<span class="dashboard-summary-card__result-label">
					<span
						class="dashboard-summary-card__metric-icon dashboard-summary-card__metric-icon--draws"
						matTooltip="Drawn games from the selected Dashboard period."
						matTooltipPosition="above"
					>
						<span class="dashboard-summary-card__metric-symbol" aria-hidden="true">=</span>
					</span>
				</span>

				<span class="dashboard-summary-card__result-rate">
					{{ formatPercent(summary.drawRatePercent) }}
				</span>
			</div>

			<div class="dashboard-summary-card__result-count">
				{{ summary.draws }}
				<span>Draws</span>
			</div>
		</div>

		<div class="dashboard-summary-card__result dashboard-summary-card__result--losses">
			<div class="dashboard-summary-card__result-main">
				<span class="dashboard-summary-card__result-label">
					<span
						class="dashboard-summary-card__metric-icon dashboard-summary-card__metric-icon--losses"
						matTooltip="Games lost from the imported account owner's perspective."
						matTooltipPosition="above"
					>
						<span class="dashboard-summary-card__metric-symbol" aria-hidden="true">−</span>
					</span>
				</span>

				<span class="dashboard-summary-card__result-rate">
					{{ formatPercent(summary.lossRatePercent) }}
				</span>
			</div>

			<div class="dashboard-summary-card__result-count">
				{{ summary.losses }}
				<span>Losses</span>
			</div>
		</div>
	</div>

	<div class="dashboard-summary-card__bar" aria-hidden="true">
		<div
			class="dashboard-summary-card__bar-segment dashboard-summary-card__bar-segment--wins"
			[style.flex-grow]="summary.wins"
		></div>

		<div
			class="dashboard-summary-card__bar-segment dashboard-summary-card__bar-segment--draws"
			[style.flex-grow]="summary.draws"
		></div>

		<div
			class="dashboard-summary-card__bar-segment dashboard-summary-card__bar-segment--losses"
			[style.flex-grow]="summary.losses"
		></div>
	</div>
</section>
