name: Release Linux

on:
    push:
        tags:
            - 'v*.*.*'

permissions:
    contents: write

jobs:
    release-linux:
        name: Build and publish Linux release
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Validate tag matches package version
              run: |
                  TAG_VERSION="${GITHUB_REF_NAME#v}"
                  PACKAGE_VERSION="$(node -p "require('./package.json').version")"

                  echo "Tag version: ${TAG_VERSION}"
                  echo "Package version: ${PACKAGE_VERSION}"

                  if [ "${TAG_VERSION}" != "${PACKAGE_VERSION}" ]; then
                    echo "Tag version does not match package.json version."
                    exit 1
                  fi

            - name: Build Linux packages
              run: npm run package:linux

            - name: Generate release notes
              run: node tools/extract-release-notes.mjs "${GITHUB_REF_NAME}"

            - name: List generated artifacts
              run: ls -lah release

            - name: Publish GitHub Release
              uses: softprops/action-gh-release@v2.6.2
              with:
                  name: My Chess Opening ${{ github.ref_name }}
                  body_path: RELEASE_NOTES.md
                  prerelease: ${{ contains(github.ref_name, '-') }}
                  fail_on_unmatched_files: true
                  files: |
                      release/*.AppImage
                      release/*.deb
