name: Release

on:
    push:
        tags:
            - 'v*.*.*'

permissions:
    contents: write

jobs:
    validate:
        name: Validate release tag
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'npm'

            - name: Validate tag matches package version
              run: |
                  TAG_VERSION="${GITHUB_REF_NAME#v}"
                  PACKAGE_VERSION="$(node -p "require('./package.json').version")"

                  echo "Tag version: ${TAG_VERSION}"
                  echo "Package version: ${PACKAGE_VERSION}"

                  if [ "${TAG_VERSION}" != "${PACKAGE_VERSION}" ]; then
                    echo "Tag version does not match package.json version."
                    exit 1
                  fi

            - name: Generate release notes
              run: node tools/extract-release-notes.mjs "${GITHUB_REF_NAME}"

            - name: Upload release notes
              uses: actions/upload-artifact@v4
              with:
                  name: release-notes
                  path: RELEASE_NOTES.md
                  if-no-files-found: error

    build-linux:
        name: Build Linux packages
        runs-on: ubuntu-latest
        needs: validate

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Build Linux packages
              run: npm run package:linux:ci

            - name: List Linux artifacts
              run: ls -lah release

            - name: Upload Linux artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: packages-linux
                  path: |
                      release/*.AppImage
                      release/*.deb
                  if-no-files-found: error

    build-windows:
        name: Build Windows packages
        runs-on: windows-latest
        needs: validate

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Build Windows packages
              run: npm run package:windows:ci

            - name: List Windows artifacts
              shell: pwsh
              run: Get-ChildItem -Path release | Format-Table Name, Length

            - name: Upload Windows artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: packages-windows
                  path: |
                      release/*.exe
                  if-no-files-found: error

    publish:
        name: Publish GitHub release
        runs-on: ubuntu-latest
        needs:
            - validate
            - build-linux
            - build-windows

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Download package artifacts
              uses: actions/download-artifact@v4
              with:
                  pattern: packages-*
                  path: release
                  merge-multiple: true

            - name: Download release notes
              uses: actions/download-artifact@v4
              with:
                  name: release-notes
                  path: .

            - name: Generate combined checksums
              run: node tools/generate-checksums.mjs

            - name: List release artifacts
              run: ls -lah release

            - name: Publish GitHub Release
              uses: softprops/action-gh-release@v2.6.2
              with:
                  name: My Chess Opening ${{ github.ref_name }}
                  body_path: RELEASE_NOTES.md
                  prerelease: ${{ contains(github.ref_name, '-') }}
                  fail_on_unmatched_files: true
                  files: |
                      release/*.AppImage
                      release/*.deb
                      release/*.exe
                      release/*.sha256
                      release/SHA256SUMS
