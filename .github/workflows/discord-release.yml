name: Notify Discord on Release

on:
    release:
        types: [published]

jobs:
    notify:
        runs-on: ubuntu-latest
        steps:
            - name: Post release announcement to Discord
              uses: actions/github-script@v7
              env:
                  DISCORD_RELEASE_WEBHOOK_URL: ${{ secrets.DISCORD_RELEASE_WEBHOOK_URL }}
              with:
                  script: |
                      const webhookUrl = process.env.DISCORD_RELEASE_WEBHOOK_URL;
                      if (!webhookUrl) {
                        core.setFailed('Missing secret: DISCORD_RELEASE_WEBHOOK_URL');
                        return;
                      }

                      const repo = process.env.GITHUB_REPOSITORY;
                      const tag = context.payload.release.tag_name;
                      const url = context.payload.release.html_url;

                      // EN-first, FR supported.
                      const content =
                        `🚀 **New release published** — \`${repo}\` **${tag}**\n${url}\n` +
                        `🇫🇷 **Nouvelle version publiée** — **${tag}**\n${url}`;

                      const res = await fetch(webhookUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ content }),
                      });

                      if (!res.ok) {
                        const text = await res.text().catch(() => '');
                        core.setFailed(`Discord webhook failed: ${res.status} ${res.statusText} ${text}`);
                      }
